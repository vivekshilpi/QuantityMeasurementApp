# Test configuration
spring.application.name=quantity-measurement-app

# H2 database for testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT test configuration
jwt.secret=TestSecretKeyForJWTTokenGenerationMustBeAtLeast256Bits123
jwt.expiration=86400000

# Mock Google OAuth2 configuration (not actually used in tests)
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile

app.oauth2.redirect-uri=http://localhost:8080/api/v1/auth/oauth2/success